name: Shell Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  syntax-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Bash syntax check
        run: |
          bash -n amneziawg-install.sh
          bash -n amneziawg-web.sh
          bash -n amneziawg-web-install.sh
          bash -n amneziawg-web-uninstall.sh
          bash -n amneziawg-web-upgrade.sh
          bash -n amneziawg-web/scripts/amneziawg-web-install.sh
          bash -n amneziawg-web/scripts/amneziawg-web-uninstall.sh
          bash -n amneziawg-web/scripts/amneziawg-web-upgrade.sh

  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install ShellCheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Run ShellCheck
        run: |
          shellcheck --severity=warning amneziawg-install.sh
          shellcheck --severity=warning amneziawg-web.sh
          shellcheck --severity=warning amneziawg-web-install.sh
          shellcheck --severity=warning amneziawg-web-uninstall.sh
          shellcheck --severity=warning amneziawg-web-upgrade.sh
          shellcheck --severity=warning amneziawg-web/scripts/amneziawg-web-install.sh
          shellcheck --severity=warning amneziawg-web/scripts/amneziawg-web-uninstall.sh
          shellcheck --severity=warning amneziawg-web/scripts/amneziawg-web-upgrade.sh
